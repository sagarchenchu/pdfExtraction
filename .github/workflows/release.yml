name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build exe & publish release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        shell: pwsh
        run: |
          $latestTag = git tag --list |
            Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
            Sort-Object { [version]($_ -replace '^v', '') } -Descending |
            Select-Object -First 1

          if ($latestTag -match '^v(\d+)\.(\d+)\.(\d+)$') {
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3] + 1
          } else {
            $major = 1
            $minor = 0
            $patch = 1
          }

          do {
            $version = "v$major.$minor.$patch"
            $exists = git tag --list $version
            if ($exists) { $patch += 1 }
          } while ($exists)

          "tag=$version" >> $env:GITHUB_OUTPUT

      - name: Create and push git tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies & build executable
        run: python build_exe.py

      - name: Verify executable was produced
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\PDFTableExtractor.exe")) {
            Write-Error "Build failed: dist\PDFTableExtractor.exe not found."
            exit 1
          }

      - name: Rename executable with version tag
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.tag }}"
          Rename-Item -Path "dist\PDFTableExtractor.exe" `
                      -NewName "PDFTableExtractor-$version.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PDF Table Extractor ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/PDFTableExtractor-${{ steps.version.outputs.tag }}.exe
